<!DOCTYPE html>
<html lang="en" dir="ltr">

<head>
    <meta charset="UTF-8">
    <script>document.documentElement.setAttribute('data-theme', localStorage.getItem('theme') || 'dark');</script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coming Soon | Sensory Deprivation Float Center</title>
    <link rel="stylesheet" href="../assets/css/style.css">
    <link rel="stylesheet" href="../assets/css/dark-mode.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:wght@500;600;700&display=swap"
        rel="stylesheet">
    <style>
        .coming-soon-wrapper {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: var(--spacing-lg);
            background: linear-gradient(rgba(15, 23, 42, 0.8), rgba(15, 23, 42, 0.9)), url('../assets/images/hero-bg.webp') center/cover;
            color: #fff;
        }
    </style>
</head>

<body>
    <main class="coming-soon-wrapper">
        <div class="container" style="max-width: 600px;">
            <div class="logo" style="font-size: 2.5rem; margin-bottom: var(--spacing-lg); color: #fff;">FLOAT it</div>
            <h1 style="color: #fff; margin-bottom: var(--spacing-sm);">We're Launching Soon.</h1>
            <p style="color: rgba(255,255,255,0.7); font-size: 1.125rem; margin-bottom: var(--spacing-lg);">Join our
                waitlist to be notified when we open our doors, and receive an exclusive founders discount on your first
                float.</p>

            <form action="https://mailchimp.com/placeholder" method="POST"
                style="display: flex; flex-direction: column; gap: var(--spacing-md);"
                aria-label="Waitlist Subscription">
                <input type="email" name="email" class="form-control" placeholder="Enter your email address" required
                    aria-required="true" style="padding: 1rem;">
                <button type="submit" class="btn btn-primary" style="padding: 1rem;">Reserve My Spot</button>
            </form>

            <div style="margin-top: var(--spacing-xl); display: flex; gap: var(--spacing-md); justify-content: center;">
                <a href="#" style="color: rgba(255,255,255,0.5);">Instagram</a>
                <a href="#" style="color: rgba(255,255,255,0.5);">Facebook</a>
            </div>
        </div>
    </main>
    <script src="../assets/js/main.js"></script>
</body>

</html>
